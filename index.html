<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CGO KPI Cascade — FY26 H2</title>
<style>
  /* Password gate */
  #pw-gate{position:fixed;inset:0;z-index:9999;background:#0f1117;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  #pw-gate.hidden{display:none}
  #pw-gate h2{color:#e2e4ea;font-size:18px;font-weight:600}
  #pw-gate input{padding:10px 16px;border-radius:8px;border:1px solid #333750;background:#1a1d27;color:#e2e4ea;font-size:16px;text-align:center;width:200px;letter-spacing:4px;outline:none}
  #pw-gate input:focus{border-color:#64BCEA}
  #pw-gate .pw-err{color:#ef4444;font-size:13px;min-height:20px}
  #pw-gate button{padding:8px 24px;border-radius:8px;border:none;background:#2c4c79;color:#fff;font-size:14px;cursor:pointer}
  #pw-gate button:hover{background:#3a6199}
</style>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --surface3: #2e3344;
    --text: #e2e4ea; --text-dim: #8b8fa5; --border: #333750;
    --primary: #2c4c79; --teal: #007F7E; --ltblue: #64BCEA; --ltteal: #43C0BE;
    --arch1: #22c55e; --arch2: #a855f7; --arch3: #f97316; --arch4: #3b82f6; --arch5: #6b7280;
    --tsunami: #eab308; --foundational: #3b82f6;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
  .app { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr; height: 100vh; }
  .header { grid-column: 1 / -1; padding: 12px 20px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .header h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .header .subtitle { font-size: 12px; color: var(--text-dim); }
  .tab-bar { display: flex; gap: 4px; margin-left: auto; }
  .tab { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-dim); border: 1px solid transparent; transition: all .15s; }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--primary); color: #fff; border-color: var(--ltblue); }
  .left { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); margin: 12px 0 6px; }
  .section-label:first-child { margin-top: 0; }
  .filter-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .chip { padding: 4px 10px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); transition: all .15s; white-space: nowrap; }
  .chip:hover { border-color: var(--text-dim); color: var(--text); }
  .chip.active { color: #fff; }
  .chip[data-arch="1"].active { background: var(--arch1); border-color: var(--arch1); }
  .chip[data-arch="2"].active { background: var(--arch2); border-color: var(--arch2); }
  .chip[data-arch="3"].active { background: var(--arch3); border-color: var(--arch3); }
  .chip[data-arch="4"].active { background: var(--arch4); border-color: var(--arch4); }
  .chip[data-arch="5"].active { background: var(--arch5); border-color: var(--arch5); }
  .chip[data-prog="tsunami"].active { background: var(--tsunami); border-color: var(--tsunami); color: #000; }
  .chip[data-prog="foundational"].active { background: var(--foundational); border-color: var(--foundational); }
  .tree { font-size: 12px; }
  .tree-node { padding: 5px 8px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 6px; margin: 1px 0; transition: background .1s; }
  .tree-node:hover { background: var(--surface2); }
  .tree-node.selected { background: var(--surface3); outline: 1px solid var(--ltblue); }
  .tree-node.dimmed { opacity: .25; }
  .tree-children { padding-left: 16px; border-left: 1px solid var(--border); margin-left: 10px; }
  .arch-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tree-node .role-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree-node .arch-tag { font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
  .center { overflow-y: auto; padding: 24px 32px; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  /* Detail view */
  .detail-empty { color: var(--text-dim); font-size: 14px; text-align: center; margin-top: 80px; }
  .detail-header { margin-bottom: 20px; display: flex; align-items: flex-start; gap: 16px; }
  .detail-header .info { flex: 1; }
  .detail-header h2 { font-size: 20px; font-weight: 700; }
  .detail-header .meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .arch-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; color: #fff; white-space: nowrap; }
  .rev-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; background: var(--surface3); color: var(--ltblue); margin-left: 6px; }

  /* KPI summary bar */
  .kpi-summary-bar { display: flex; height: 32px; border-radius: 6px; overflow: hidden; margin-bottom: 24px; }
  .kpi-summary-bar .seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; cursor: pointer; transition: opacity .15s; position: relative; }
  .kpi-summary-bar .seg:hover { opacity: .85; }
  .kpi-summary-bar .seg .seg-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; }

  /* KPI sections */
  .kpi-section { margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .kpi-section-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background .1s; }
  .kpi-section-header:hover { background: var(--surface3); }
  .kpi-section-header .kpi-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .kpi-section-header .kpi-title .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .kpi-section-header .kpi-weight { font-size: 18px; font-weight: 800; }
  .kpi-section-header .kpi-program { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 600; margin-left: 8px; }
  .kpi-program.tsunami { background: rgba(234,179,8,.15); color: var(--tsunami); }
  .kpi-program.foundational { background: rgba(59,130,246,.15); color: var(--foundational); }
  .kpi-program.both { background: rgba(67,192,190,.15); color: var(--ltteal); }
  .kpi-section.dimmed { opacity: .2; }

  /* Measures table */
  .measures { padding: 0 16px 16px; }
  .measures table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .measures th { text-align: left; padding: 6px 8px; color: var(--text-dim); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  .measures td { padding: 8px 8px; border-bottom: 1px solid rgba(51,55,80,.5); vertical-align: top; line-height: 1.4; }
  .measures tr:last-child td { border-bottom: none; }
  .measures .measure-name { color: var(--text); font-weight: 500; }
  .measures .target { color: var(--ltteal); font-weight: 600; font-size: 11px; }
  .measures .measured-by { color: var(--text-dim); font-size: 11px; }

  /* Compare view */
  .compare-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .compare-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: border-color .15s; }
  .compare-card:hover { border-color: var(--ltblue); }
  .compare-card.dimmed { opacity: .2; }
  .cc-name { font-size: 12px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .cc-dot { width: 8px; height: 8px; border-radius: 50%; }
  .stacked-bar { height: 24px; border-radius: 4px; overflow: hidden; display: flex; margin-bottom: 6px; }
  .stacked-bar .seg { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; color: #fff; }
  .compare-legend { font-size: 10px; color: var(--text-dim); line-height: 1.6; }
  .compare-legend span { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 3px; vertical-align: middle; }

  /* Principles */
  .principles { max-width: 800px; }
  .principles h3 { font-size: 14px; font-weight: 600; margin: 16px 0 8px; color: var(--ltblue); }
  .principles p { color: var(--text-dim); font-size: 13px; line-height: 1.5; margin-bottom: 8px; }
  .principles ol { padding-left: 20px; font-size: 13px; }
  .principles li { margin-bottom: 6px; color: var(--text-dim); line-height: 1.5; }
  .principles strong { color: var(--text); }
  .rev-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
  .rev-table th, .rev-table td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
  .rev-table th { color: var(--text-dim); font-weight: 600; font-size: 11px; }

  .dept-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin: 16px 0 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
  .dept-label:first-child { margin-top: 0; }

  /* Org chart */
  .org-controls { display: flex; gap: 6px; margin-bottom: 16px; }
  .org-btn { padding: 5px 14px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); transition: all .15s; }
  .org-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .org-btn.active { background: var(--primary); color: #fff; border-color: var(--ltblue); }
  .org-grid { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .org-level { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 0; }
  .org-node { padding: 8px 14px; border-radius: 8px; background: var(--surface2); border: 2px solid var(--border); cursor: pointer; text-align: center; min-width: 110px; max-width: 160px; transition: all .15s; }
  .org-node:hover { border-color: var(--ltblue); }
  .org-node.highlighted { border-color: var(--ltblue); box-shadow: 0 0 12px rgba(100,188,234,.3); }
  .org-node .on-name { font-size: 11px; font-weight: 600; line-height: 1.3; }
  .org-node .on-arch { font-size: 9px; margin-top: 2px; }
  .org-connector-v { width: 2px; height: 12px; background: var(--border); margin: 0 auto; }
  .org-branch { display: flex; flex-direction: column; align-items: center; }

  /* Cascade flow */
  .cascade-flow { display: flex; flex-direction: column; gap: 0; }
  .cascade-connector { width: 2px; height: 20px; background: var(--border); margin: 0 0 0 30px; }
  .cascade-role { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .cascade-role.is-selected { border-color: var(--ltblue); box-shadow: 0 0 16px rgba(100,188,234,.2); }
  .cascade-role .cr-header { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .1s; }
  .cascade-role .cr-header:hover { background: var(--surface2); }
  .cascade-role .cr-indent { font-size: 11px; color: var(--text-dim); font-family: monospace; white-space: pre; }
  .cascade-role .cr-name { font-size: 14px; font-weight: 700; flex: 1; }
  .cascade-role .cr-meta { font-size: 10px; color: var(--text-dim); }
  .cascade-role .cr-body { padding: 0 16px 16px; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>
<div id="pw-gate">
  <h2>CGO KPI Cascade</h2>
  <input id="pw-input" type="password" placeholder="Code" maxlength="10" autocomplete="off">
  <div id="pw-err" class="pw-err"></div>
  <button id="pw-btn">Enter</button>
</div>
<div class="app">
  <div class="header">
    <div>
      <h1>CGO KPI Cascade</h1>
      <div class="subtitle">FY26 H2 &middot; 28 roles &middot; 5 archetypes &middot; Click any role for full measures</div>
    </div>
    <div class="tab-bar">
      <div class="tab" data-view="org" onclick="switchView('org')">Org Structure</div>
      <div class="tab active" data-view="detail" onclick="switchView('detail')">Cascade Detail</div>
      <div class="tab" data-view="compare" onclick="switchView('compare')">Compare All</div>
      <div class="tab" data-view="principles" onclick="switchView('principles')">Principles</div>
    </div>
  </div>
  <div class="left">
    <div class="section-label">Archetypes</div>
    <div class="filter-chips" id="arch-filters"></div>
    <div class="section-label">Program</div>
    <div class="filter-chips" id="prog-filters">
      <div class="chip active" data-prog="all" onclick="filterProg('all')">All</div>
      <div class="chip" data-prog="tsunami" onclick="filterProg('tsunami')">Tsunami</div>
      <div class="chip" data-prog="foundational" onclick="filterProg('foundational')">Foundational</div>
    </div>
    <div class="section-label">Org Tree</div>
    <div class="legend" id="legend"></div>
    <div class="tree" id="tree"></div>
  </div>
  <div class="center" id="center"></div>
</div>

<script>
const KPI_COLORS = ['#22c55e','#3b82f6','#f97316','#a855f7','#6b7280'];
const ARCH_COLORS = { 1:'#22c55e', 2:'#a855f7', 3:'#f97316', 4:'#3b82f6', 5:'#6b7280' };
const ARCH_NAMES = { 1:'Revenue Driver', 2:'Brand & Creative', 3:'Revenue Leadership', 4:'Functional Leadership', 5:'Pipeline Support' };

const roles = [
  // ── DIRECT TO CGO ──
  { id:'ail', name:'AI Innovation Lead (Further Scoping Required)', arch:1, parent:'cgo', chain:'CGO \u2192 AI Innovation Lead', code:'AIML-L2', rev:75,
    kpis:[
      {n:'AI Agent Delivery & Commercial Impact',w:40,p:'tsunami',measures:[
        {m:'Core agents deployed per Growth function',t:'\u22653 per function (Sales, BD, Marketing) within 3 months',by:'Agent deployment log'},
        {m:'Agent adoption by target users',t:'\u226570% within 1 month of deployment; \u226580% sustained',by:'Usage tracking (daily/weekly active users)'},
        {m:'Quantified commercial impact ($)',t:'\u2265$500K annualised savings/revenue attributable to AI agents by end Q4',by:'Quarterly AI impact report \u2014 CGO + CFO sign-off'},
        {m:'Marketing work completed via AI',t:'\u226530% within 6 months; \u226550% within 12 months',by:'Quarterly usage tracking'}
      ]},
      {n:'Cross-Function AI Enablement',w:20,p:'both',measures:[
        {m:'Growth team AI adoption rate',t:'\u226580% of Growth staff using \u22651 AI agent weekly',by:'Usage tracking per team'},
        {m:'Training delivery',t:'\u22651 session/month; \u226590% attendance for new agent rollouts',by:'Training log / attendance records'},
        {m:'Team AI confidence score',t:'\u22654.0/5 across Growth team',by:'Quarterly capability assessment'},
        {m:'Cross-functional AI projects (Care, Finance, QA)',t:'\u22651 agent deployed outside Growth per quarter',by:'Agent deployment log \u2014 cross-functional'}
      ]},
      {n:'Agent Operations & Reliability',w:15,p:'foundational',measures:[
        {m:'Total agents deployed and maintained',t:'\u226515 by end Q4 (10 Growth + 5 cross-functional)',by:'Agent registry'},
        {m:'Agent uptime',t:'\u226595%; all documented with runbooks',by:'Monthly uptime report'},
        {m:'Time-to-deploy (new agent)',t:'\u22642 weeks from requirement to production',by:'Deployment log timestamps'},
        {m:'Time saved tracked and reported',t:'\u226520 hrs saved/month across teams; reported monthly',by:'Efficiency report'}
      ]},
      {n:'Stakeholder CSAT & Delivery Quality',w:15,p:'both',measures:[
        {m:'Cross-functional stakeholder CSAT',t:'\u22654.0/5',by:'Quarterly survey (Sales, BD, Marketing, Care, Ops)'},
        {m:'Quarterly AI impact report (commercial + efficiency)',t:'Delivered on time with documented $ impact and adoption metrics',by:'CGO review / sign-off'},
        {m:'Service delivery within SLA',t:'\u226590% of requests within agreed SLA',by:'Asana SLA reporting'}
      ]},
      {n:'Innovation & Culture',w:10,p:'both',measures:[
        {m:'Tool evaluations',t:'\u22653/quarter with recommendation; \u22651 adopted',by:'Tool evaluation log'},
        {m:'Knowledge sharing',t:'\u22651 demo/month; tech stack inventory current',by:'Demo log / inventory'},
        {m:'Meeting attendance and contribution',t:'100%; \u22651 AI innovation insight per week to CGO',by:'Meeting records / stand-up notes'}
      ]}
    ]},
  { id:'hcx', name:'Head of CX (Further Scoping Required)', arch:4, parent:'cgo', chain:'CGO \u2192 Head of CX', code:'HCX-L3', rev:30,
    kpis:[
      {n:'Enterprise CSAT & Experience Governance',w:30,p:'both',measures:[
        {m:'Enterprise CSAT framework operational',t:'Baseline established by month 3; tracked monthly across all customer-facing functions',by:'CSAT reporting framework / survey platform'},
        {m:'CSAT variance between departments',t:'<15% between highest and lowest team',by:'Cross-team CSAT comparison (monthly)'},
        {m:'Enterprise CSAT score (client)',t:'\u22654.0/5 (aggregate across Sales, Care, Accounts)',by:'Monthly client survey'},
        {m:'Monthly CX performance report to CGO',t:'On time; actionable insights with department-level breakdowns',by:'Report submission log / CGO review'}
      ]},
      {n:'Complaint Resolution & Service Recovery',w:25,p:'both',measures:[
        {m:'Complaint resolution within SLA',t:'\u226595% resolved within published SLA (varies by severity)',by:'Zoho CRM complaints module'},
        {m:'Complaint volume trend',t:'Reducing QoQ (controllable complaints)',by:'Zoho CRM \u2014 controllable vs uncontrollable split'},
        {m:'Root cause analysis coverage',t:'100% of recurring complaint categories analysed; systemic fixes tracked',by:'Quarterly RCA report to CGO'},
        {m:'Service recovery CSAT',t:'\u22653.5/5 post-complaint satisfaction',by:'Post-resolution survey'}
      ]},
      {n:'CX Standards & Embedment',w:20,p:'foundational',measures:[
        {m:'CX interaction model embedded across customer-facing teams',t:'100% of teams trained and audited by end Q4',by:'QA audit / adoption tracker'},
        {m:'Telephony standards (call answering & callback)',t:'Answer rate \u226585%; callback <30min; improving QoQ',by:'Aircall reporting'},
        {m:'Email/SMS cadence standards reviewed',t:'100% of automated comms audited and optimised',by:'Comms audit log'},
        {m:'AI QA integration (CX lens)',t:'CX quality criteria embedded in AI QA scoring framework',by:'AI QA audit \u2014 CX-specific dimensions tracked'}
      ]},
      {n:'Cross-Functional CX Improvement',w:15,p:'both',measures:[
        {m:'CX governance cadence operating',t:'Monthly cross-functional CX rhythm with Sales, Care, Accounts, Compliance reps',by:'Meeting log / action tracker'},
        {m:'Department CX improvement plans',t:'100% of customer-facing functions have active improvement plans',by:'Improvement plan tracker'},
        {m:'Care-to-Growth handover experience',t:'Client experience at care\u2192sales/retention handover points \u22654.0/5',by:'Handover CSAT survey (post-referral)'},
        {m:'Onboarding-to-care transition CSAT',t:'\u22654.0/5 at 30-day and 90-day post-onboarding',by:'Post-transition survey'}
      ]},
      {n:'Stakeholder CSAT & Culture',w:10,p:'both',measures:[
        {m:'Cross-functional stakeholder CSAT',t:'\u22654.0/5',by:'Quarterly survey (Sales, Care, Accounts, Compliance leaders)'},
        {m:'CX awareness across org',t:'\u226580% of customer-facing staff can articulate CX standards',by:'Quarterly pulse / spot-check'}
      ]}
    ]},

  // ── SALES ──
  { id:'gms', name:'GM Sales', arch:3, parent:'cgo', chain:'CGO \u2192 GM Sales', code:'GMS-GM', rev:65,
    kpis:[
      {n:'Acquisition & Revenue',w:40,p:'tsunami',measures:[
        {m:'Department client acquisitions vs Growth budget',t:'Team to hit Growth budget (Sales contribution)',by:'CRM onboarding tracker'},
        {m:'B2C contribution to total company onboards',t:'\u226545%',by:'Attribution reporting'},
        {m:'SQL conversion rate',t:'\u226560%',by:'CRM pipeline reporting'},
        {m:'Speed to lead (inbound)',t:'\u22645 min (95% of the time)',by:'CRM/Aircall timestamps'},
        {m:'Forecast accuracy (department)',t:'+/-5%',by:'Forecast vs actuals'}
      ]},
      {n:'Client Retention & Churn Reduction',w:15,p:'tsunami',measures:[
        {m:'Pre-service churn rate (signed but never activated)',t:'10% \u2192 7% by Dec 2026',by:'CRM pre-service tracking'},
        {m:'Total in-service churn rate (department)',t:'\u22642.4%/month',by:'Terminations / active clients (monthly)'},
        {m:'At-risk client save rate',t:'\u226525% of flagged at-risk clients retained',by:'CRM at-risk register + save outcomes'},
        {m:'Win-back conversion rate',t:'\u226515% of churned clients within 90 days',by:'CRM win-back tracking'},
        {m:'Care-to-Growth referral response time',t:'\u226448hrs from COO-Care flag to concierge/retention contact',by:'CRM referral tracking'}
      ]},
      {n:'Utilisation & Platform Fee Revenue',w:10,p:'tsunami',measures:[
        {m:'Concierge-attributed utilisation uplift',t:'>+5% per client intervention (90-day measurement)',by:'Portal utilisation report \u2014 concierge-engaged vs control'},
        {m:'Concierge client engagement rate',t:'\u226590% of flagged under-utilised clients contacted within 5 days',by:'CRM concierge activity tracking'},
        {m:'Platform fee revenue growth (concierge-attributed)',t:'Measurable improvement vs non-engaged clients',by:'Finance reporting \u2014 A/B tracking'}
      ]},
      {n:'Foundational Delivery',w:15,p:'foundational',isThemed:true,measures:[
        {m:'Pipeline & Lead Management',t:'Speed to lead SLA <=5min >=95%; >=80% dormant leads in active journey',by:'Aircall/CRM timestamp audit; Automation platform',theme:true},
        {m:'Process, Playbooks & Capability',t:'Sales + retention playbooks published, team certified; 100% weekly 1:1s',by:'Training log + assessment; 1:1 log audit',theme:true},
        {m:'CRM, Data & Systems',t:'CRM data >=95% complete; migration checklist done; 100% AI call notes',by:'Monthly CRM audit; checklist sign-off',theme:true},
        {m:'Performance Visibility & QA',t:'QA >=95% call coverage; dashboards live; churn segmentation tracked monthly',by:'QA audit; dashboard tracking; report audit',theme:true}
      ]},

// ── STATE ──
const state = { view:'detail', selectedRole:null, archFilter:'all', progFilter:'all' };

// ── INIT ──
function init() {
  renderArchFilters();
  renderLegend();
  renderTree();
  renderCenter();
}

function renderArchFilters() {
  const c = document.getElementById('arch-filters');
  let h = '<div class="chip active" data-arch="all" onclick="filterArch(\'all\')">All</div>';
  for (let i=1;i<=5;i++) h += `<div class="chip" data-arch="${i}" onclick="filterArch(${i})">${ARCH_NAMES[i]}</div>`;
  c.innerHTML = h;
}
function renderLegend() {
  const c = document.getElementById('legend');
  let h = '';
  for (let i=1;i<=5;i++) h += `<div class="legend-item"><div class="legend-dot" style="background:${ARCH_COLORS[i]}"></div>${ARCH_NAMES[i]}</div>`;
  c.innerHTML = h;
}

function filterArch(v) {
  state.archFilter = v;
  document.querySelectorAll('#arch-filters .chip').forEach(c => c.classList.toggle('active', c.dataset.arch == v));
  applyFilters();
}
function filterProg(v) {
  state.progFilter = v;
  document.querySelectorAll('#prog-filters .chip').forEach(c => c.classList.toggle('active', c.dataset.prog == v));
  applyFilters();
  if (state.selectedRole) renderDetail(state.selectedRole);
}
function applyFilters() {
  document.querySelectorAll('.tree-node[data-id]').forEach(el => {
    const r = roles.find(x => x.id === el.dataset.id);
    if (!r) return;
    let dim = false;
    if (state.archFilter !== 'all' && r.arch != state.archFilter) dim = true;
    if (state.progFilter !== 'all' && !r.kpis.some(k => k.p === state.progFilter || k.p === 'both')) dim = true;
    el.classList.toggle('dimmed', dim);
  });
  document.querySelectorAll('.compare-card').forEach(el => {
    const r = roles.find(x => x.id === el.dataset.id);
    if (!r) return;
    let dim = false;
    if (state.archFilter !== 'all' && r.arch != state.archFilter) dim = true;
    el.classList.toggle('dimmed', dim);
  });
}

function renderTree() {
  const c = document.getElementById('tree');
  function build(pid) {
    const ch = roles.filter(r => r.parent === pid);
    if (!ch.length) return '';
    let h = '<div class="tree-children">';
    ch.forEach(r => {
      h += `<div class="tree-node" data-id="${r.id}" onclick="selectRole('${r.id}')">
        <div class="arch-dot" style="background:${ARCH_COLORS[r.arch]}"></div>
        <span class="role-name" title="${r.name}">${r.name}</span>
        <span class="arch-tag">${r.arch}</span>
      </div>`;
      h += build(r.id);
    });
    h += '</div>';
    return h;
  }
  c.innerHTML = `<div class="tree-node" style="font-weight:700;color:var(--ltblue)">
    <span class="role-name">CGO FY26 Objectives</span>
  </div>` + build('cgo');
}

function selectRole(id) {
  state.selectedRole = id;
  document.querySelectorAll('.tree-node').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
  if (state.view === 'org') {
    renderOrg(document.getElementById('center'));
  } else {
    if (state.view !== 'detail') switchView('detail');
    else renderCascadeDetail(id);
  }
}

function switchView(v) {
  state.view = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === v));
  renderCenter();
}

function renderCenter() {
  const c = document.getElementById('center');
  if (state.view === 'org') renderOrg(c);
  else if (state.view === 'detail') {
    if (state.selectedRole) renderCascadeDetail(state.selectedRole);
    else c.innerHTML = '<div class="detail-empty">Select a role from the tree to see the full cascade — selected role + all direct reports with KPI detail</div>';
  } else if (state.view === 'compare') renderCompare(c);
  else if (state.view === 'principles') renderPrinciples(c);
}

// Build a single role's KPI card HTML
function buildRoleCard(r, isSelected) {
  const totalMeasures = r.kpis.reduce((s, k) => s + k.measures.length, 0);

  let barHtml = '';
  r.kpis.forEach((k, i) => {
    let op = 1;
    if (state.progFilter !== 'all' && k.p !== state.progFilter && k.p !== 'both') op = 0.2;
    const color = KPI_COLORS[i % KPI_COLORS.length];
    barHtml += `<div class="seg" style="width:${k.w}%;background:${color};opacity:${op}" title="${k.n}: ${k.w}%">
      <span class="seg-label">${k.w >= 15 ? k.n + ' ' + k.w + '%' : k.w + '%'}</span>
    </div>`;
  });

  let sectionsHtml = '';
  r.kpis.forEach((k, i) => {
    const progLabel = k.p === 'tsunami' ? 'Tsunami' : k.p === 'foundational' ? 'Foundational' : 'Both';
    const dimmed = state.progFilter !== 'all' && k.p !== state.progFilter && k.p !== 'both';
    const color = KPI_COLORS[i % KPI_COLORS.length];
    let measuresHtml = '';
    if (k.measures && k.measures.length) {
      measuresHtml = `<div class="measures"><table>
        <tr><th>Measure</th><th>Target</th><th>Measured By</th></tr>`;
      k.measures.forEach(ms => {
        measuresHtml += `<tr>
          <td class="measure-name">${ms.m}</td>
          <td class="target">${ms.t}</td>
          <td class="measured-by">${ms.by}</td>
        </tr>`;
      });
      measuresHtml += '</table></div>';
    }
    sectionsHtml += `<div class="kpi-section${dimmed ? ' dimmed' : ''}" style="border-color:${color}">
      <div class="kpi-section-header" style="background:${color}15">
        <div class="kpi-title">
          <div class="dot" style="background:${color}"></div>
          KPI ${i+1}: ${k.n}
          <span class="kpi-program ${k.p}">${progLabel}</span>
        </div>
        <div class="kpi-weight" style="color:${color}">${k.w}%</div>
      </div>
      ${measuresHtml}
    </div>`;
  });

  return `<div class="cascade-role${isSelected ? ' is-selected' : ''}">
    <div class="cr-header" onclick="selectRole('${r.id}')">
      <div class="arch-dot" style="background:${ARCH_COLORS[r.arch]};width:10px;height:10px"></div>
      <div class="cr-name">${r.name}</div>
      <span class="arch-badge" style="background:${ARCH_COLORS[r.arch]};font-size:9px;padding:2px 8px">${ARCH_NAMES[r.arch]}</span>
      <span class="rev-badge" style="font-size:9px;padding:2px 8px">Rev% ${r.rev || ''}%</span>
      <div class="cr-meta">${r.code} &middot; ${r.kpis.length} KPIs &middot; ${totalMeasures} measures</div>
    </div>
    <div class="cr-body">
      <div class="kpi-summary-bar">${barHtml}</div>
      ${sectionsHtml}
    </div>
  </div>`;
}

// Get all descendants of a role (recursive)
function getDescendants(parentId) {
  const children = roles.filter(r => r.parent === parentId);
  let result = [];
  children.forEach(ch => {
    result.push(ch);
    result = result.concat(getDescendants(ch.id));
  });
  return result;
}

// Cascade Detail: selected role + all roles below in a waterfall
function renderCascadeDetail(id) {
  const r = roles.find(x => x.id === id);
  if (!r) return;
  const c = document.getElementById('center');
  const descendants = getDescendants(id);

  let html = '<div class="cascade-flow">';
  // Selected role first
  html += buildRoleCard(r, true);
  // Then all descendants with connectors
  descendants.forEach(d => {
    html += '<div class="cascade-connector"></div>';
    html += buildRoleCard(d, false);
  });
  html += '</div>';
  c.innerHTML = html;

  // Scroll to top
  c.scrollTop = 0;
}

// Org Structure view
function renderOrg(container) {
  const deptGroups = [
    { label: 'Full CGO Organisation', key: 'all' },
    { label: 'Sales', key: 'sales' },
    { label: 'Business Development', key: 'bd' },
    { label: 'Marketing', key: 'mktg' },
    { label: 'Direct to CGO', key: 'direct' },
    { label: 'Mktg Restructure (Q1 FY27)', key: 'restructure' },
  ];

  if (!state.orgDept) state.orgDept = 'all';

  function getOrgRoots() {
    if (state.orgDept === 'all') return roles.filter(r => r.parent === 'cgo');
    if (state.orgDept === 'sales') return roles.filter(r => r.id === 'gms');
    if (state.orgDept === 'bd') return roles.filter(r => r.id === 'gmbd');
    if (state.orgDept === 'mktg') return roles.filter(r => r.id === 'gmm');
    if (state.orgDept === 'direct') return roles.filter(r => r.id === 'ail' || r.id === 'hcx');
    if (state.orgDept === 'restructure') return roles.filter(r => r.restructure && r.parent === 'cgo');
    return [];
  }

  function buildOrgBranch(role) {
    const children = roles.filter(r => r.parent === role.id);
    const hl = state.selectedRole === role.id ? ' highlighted' : '';
    let html = `<div class="org-branch">
      <div class="org-node${hl}" onclick="selectRole('${role.id}')" style="border-color:${ARCH_COLORS[role.arch]}40">
        <div class="on-name">${role.name}</div>
        <div class="on-arch" style="color:${ARCH_COLORS[role.arch]}">${ARCH_NAMES[role.arch]}</div>
      </div>`;
    if (children.length) {
      html += '<div class="org-connector-v"></div><div class="org-level">';
      children.forEach(ch => { html += buildOrgBranch(ch); });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  let controlsHtml = '<div class="org-controls">';
  deptGroups.forEach(g => {
    controlsHtml += `<div class="org-btn${state.orgDept === g.key ? ' active' : ''}" onclick="state.orgDept='${g.key}';renderOrg(document.getElementById('center'))">${g.label}</div>`;
  });
  controlsHtml += '</div>';

  const roots = getOrgRoots();
  let orgHtml = '<div class="org-grid">';
  // CGO root node
  orgHtml += `<div class="org-node" style="border-color:var(--ltblue);background:var(--primary)">
    <div class="on-name" style="color:#fff">CGO</div>
    <div class="on-arch" style="color:var(--ltblue)">Nick Lunn</div>
  </div><div class="org-connector-v"></div><div class="org-level">`;
  roots.forEach(r => { orgHtml += buildOrgBranch(r); });
  orgHtml += '</div></div>';

  container.innerHTML = controlsHtml + orgHtml;
}

function renderCompare(container) {
  const groups = [
    {label:'Direct to CGO', ids:['ail','hcx']},
    {label:'Sales', ids:['gms','stl','ssr','sr','sso','cec','csrs']},
    {label:'Business Development', ids:['gmbd','pmtl','spm','pm','apm','rmtl','rm','plm']},
    {label:'Marketing', ids:['gmm','hodm','dml','cas','sme','mom','ce','lgd','gd','eme','mc']},
    {label:'Mktg Restructure (Q1 FY27)', ids:['r_gmm','r_hop','r_pb','r_mom','r_ccb','r_sdb','r_ccab','r_ss','r_ail']},
  ];
  let h = '';
  groups.forEach(g => {
    h += `<div class="dept-label">${g.label}</div><div class="compare-grid">`;
    g.ids.forEach(id => {
      const r = roles.find(x => x.id === id);
      const mc = r.kpis.reduce((s,k) => s + k.measures.length, 0);
      h += `<div class="compare-card" data-id="${id}" onclick="selectRole('${id}')">
        <div class="cc-name"><div class="cc-dot" style="background:${ARCH_COLORS[r.arch]}"></div>${r.name} <span style="color:var(--text-dim);font-weight:400;font-size:10px">(${r.kpis.length} KPIs, ${mc} measures)</span></div>
        <div class="stacked-bar">`;
      r.kpis.forEach((k,i) => {
        let op = 1;
        if (state.progFilter !== 'all' && k.p !== state.progFilter && k.p !== 'both') op = 0.15;
        const color = KPI_COLORS[i % KPI_COLORS.length];
        h += `<div class="seg" style="width:${k.w}%;background:${color};opacity:${op}" title="${k.n}: ${k.w}%">${k.w>10?k.w+'%':''}</div>`;
      });
      h += `</div><div class="compare-legend">`;
      r.kpis.forEach((k,i) => {
        const color = KPI_COLORS[i % KPI_COLORS.length];
        h += `<span style="background:${color}"></span>${k.n} (${k.w}%)<br>`;
      });
      h += '</div></div>';
    });
    h += '</div>';
  });
  container.innerHTML = h;
  applyFilters();
}

function renderPrinciples(container) {
  container.innerHTML = `<div class="principles">

    <h3 style="color:var(--ltblue);font-size:20px;margin-bottom:4px;">Why This Model Exists</h3>
    <p>We're in a once-in-a-generation market window. 83,000 new Support at Home packages launched November 2025, creating a tsunami of demand. That window closes as competitors catch up \u2014 likely by mid-FY27. Every KPI in this cascade is designed to answer one question: <strong style="color:var(--ltblue)">are we converting this opportunity into durable market share before the window shuts?</strong></p>

    <h3 style="margin-top:28px;">The Strategic Tension</h3>

    <tr><td><span style="color:var(--foundational);font-weight:700">Foundational</span></td><td style="color:var(--text-dim)">Fix broken things \u2014 website, CRM, attribution, AI adoption, team capability</td><td style="color:var(--text-dim)">Without foundations, we can't scale when competition arrives. We'd be spending more to acquire clients we can't retain</td></tr></table>

    <h3 style="margin-top:28px;">How the Cascade Works</h3>
    <p style="color:var(--text-dim)">Every role in this cascade traces back to a Growth budget number. The weight tells you what percentage of someone's performance rating comes from each area. The closer you are to the client, the more weight sits on revenue outcomes.</p>

    <h3>Design Decisions (and Why)</h3>
    <ol>
      <li><strong>Revenue is king.</strong> Outcome KPIs weighted highest. Closer to the action = higher revenue weight. This isn't a philosophical choice \u2014 it's because our business model only works if we grow. A sales rep who is culturally perfect but misses target is a problem. Weights reflect that.</li>
      <li><strong>Lead indicators are weighted, not just tracked.</strong> Activity and pipeline aren't "nice to have" \u2014 they're how you diagnose and coach before it's too late. A rep with low activity in week 2 will miss target in week 4. By weighting activity, we create early intervention points.</li>
      <li><strong>CSAT is mandatory on every role.</strong> Not just leaders. Every revenue-carrying person has a CSAT measure because retention starts at first contact. If the onboarding experience is poor, we lose clients before they generate a single dollar of platform fees.</li>

    <h3 style="margin-top:28px;">5 Role Archetypes</h3>
    <p style="color:var(--text-dim)">Every role in the cascade is assigned an archetype. This isn't just a label \u2014 it determines the KPI structure, weighting pattern, and number of measures. It also makes it easy to compare "like for like" across departments.</p>

    <h3 style="margin-top:28px;">Marketing Restructure \u2014 The Builder Model (Q1 FY27)</h3>
    <p style="color:var(--text-dim)">The current KPIs are based on a 12-person specialist model. The restructure moves to a 7-person builder model where AI handles 70% of execution and humans apply judgment on the 30% requiring strategy, voice, empathy, and nuance.</p>

}

// Password gate
(function(){
  const hash='a665a45920422f9d417e4867efdc4fb8a04a1f3fff1fa07e998e86f7f7a27ae3'; // sha256 of 1212
  const gate=document.getElementById('pw-gate');
  const inp=document.getElementById('pw-input');
  const err=document.getElementById('pw-err');
  const btn=document.getElementById('pw-btn');
  if(sessionStorage.getItem('kpi-auth')==='1'){gate.classList.add('hidden');init();return;}
  document.querySelector('.app').style.display='none';
  async function check(){
    const v=inp.value.trim();
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
    const h=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    if(h===hash){sessionStorage.setItem('kpi-auth','1');gate.classList.add('hidden');document.querySelector('.app').style.display='';init();}
    else{err.textContent='Incorrect code';inp.value='';inp.focus();}
  }
  btn.addEventListener('click',check);
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')check();});
  inp.focus();
})();
</script>
